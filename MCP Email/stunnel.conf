# stunnel configuration for the MCP Email Connector.
#
# The mail server is Microsoft Exchange Server 2007, which only supports the
# legacy TLS 1.0 protocol. Modern Node/OpenSSL has removed TLS 1.0, so it cannot
# talk to Exchange directly. stunnel (built against an OpenSSL that still allows
# TLS 1.0 at security level 0) bridges the gap:
#
#   Node app  --plaintext-->  127.0.0.1:11993  --[stunnel: TLS 1.0]-->  Exchange:993
#
# Only IMAP needs the bridge. SMTP uses port 587 directly (465/SMTPS is
# firewall-blocked) and is handled by the app, not stunnel.

# Reduce log noise. Raise to debug = 7 when troubleshooting the handshake.
debug = 6
# Absolute path: when run as a Windows service the working directory is not
# this project folder, so a relative path would write the log elsewhere.
output = C:\Users\Lenovo\Documents\Claude\MCP Email\stunnel-debug.log

# --- Allow the legacy TLS 1.0 that Exchange 2007 requires -------------------
# SECLEVEL=0 re-enables the old ciphers/protocols that OpenSSL 3 disables.
options = -NO_TLSv1
sslVersionMin = TLSv1
sslVersionMax = TLSv1
ciphers = DEFAULT@SECLEVEL=0

[imaps-bridge]
client = yes
accept = 127.0.0.1:11993
connect = mail.triasmail.co.id:993
# Exchange 2007 presents an old certificate; we only need the encrypted pipe,
# not chain validation (the loopback side is local and trusted).
verify = 0
